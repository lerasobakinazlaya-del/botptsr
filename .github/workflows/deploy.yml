name: Deploy Bot

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Git branch to deploy"
        required: false
        default: ""
      app_dir:
        description: "Server project directory"
        required: false
        default: "/opt/bot"

jobs:
  prelaunch-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve deploy branch
        id: vars
        run: |
          BRANCH="${{ github.event.inputs.branch }}"
          if [ -z "$BRANCH" ]; then
            BRANCH="${{ github.ref_name }}"
          fi
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.vars.outputs.branch }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run prelaunch checks
        run: python scripts/prelaunch_check.py

  deploy:
    runs-on: ubuntu-latest
    needs: prelaunch-checks

    steps:
      - name: Resolve deploy branch
        id: vars
        run: |
          BRANCH="${{ github.event.inputs.branch }}"
          if [ -z "$BRANCH" ]; then
            BRANCH="${{ github.ref_name }}"
          fi
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.vars.outputs.branch }}

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Build deploy archive
        run: |
          tar \
            --exclude='.git' \
            --exclude='venv' \
            --exclude='logs' \
            --exclude='.env' \
            --exclude='bot.db' \
            --exclude='bot.db-shm' \
            --exclude='bot.db-wal' \
            -czf /tmp/bot-deploy.tgz .

      - name: Upload archive to server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          scp -P "${DEPLOY_PORT:-22}" /tmp/bot-deploy.tgz "${DEPLOY_USER}@${DEPLOY_HOST}:/tmp/bot-deploy.tgz"

      - name: Deploy on server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          APP_DIR: ${{ github.event.inputs.app_dir }}
          DEPLOY_BRANCH: ${{ steps.vars.outputs.branch }}
          DEPLOY_COMMIT: ${{ github.sha }}
        run: |
          ssh -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" "
            set -e
            mkdir -p '${APP_DIR}'
            tar -xzf /tmp/bot-deploy.tgz -C '${APP_DIR}'
            rm -f /tmp/bot-deploy.tgz
            find '${APP_DIR}/deploy' -type f \( -name '*.sh' -o -name '*.service' \) -exec sed -i 's/\r$//' {} +
            chmod +x '${APP_DIR}/deploy/systemd/update_bot.sh'
            cd '${APP_DIR}'
            SKIP_GIT=1 APP_DIR='${APP_DIR}' DEPLOY_BRANCH='${DEPLOY_BRANCH}' DEPLOY_COMMIT='${DEPLOY_COMMIT}' ./deploy/systemd/update_bot.sh '${DEPLOY_BRANCH}'
          "

      - name: Verify Redis and admin health on server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          APP_DIR: ${{ github.event.inputs.app_dir }}
          EXPECTED_COMMIT: ${{ github.sha }}
        run: |
          ssh -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" 'bash -s' -- "${APP_DIR}" "${EXPECTED_COMMIT}" <<'REMOTE'
          set -euo pipefail
          APP_DIR="$1"
          EXPECTED_COMMIT="$2"
          ENV_FILE="${APP_DIR}/.env"
          HEALTH_JSON="$(mktemp)"

          echo "==> Checking Redis"
          redis-cli ping | tee /tmp/redis-ping.log
          grep -qx 'PONG' /tmp/redis-ping.log

          echo "==> Reading admin credentials"
          if [ ! -f "$ENV_FILE" ]; then
            echo "Missing $ENV_FILE" >&2
            exit 1
          fi

          mapfile -t ADMIN_AUTH < <(/usr/bin/env python3 - "$ENV_FILE" <<'PY'
          import sys
          from pathlib import Path

          env_path = Path(sys.argv[1])
          values = {}
          for raw_line in env_path.read_text(encoding="utf-8").splitlines():
              line = raw_line.strip()
              if not line or line.startswith("#") or "=" not in line:
                  continue
              key, value = line.split("=", 1)
              values[key.strip()] = value.strip().strip('"').strip("'")

          print(values.get("ADMIN_DASHBOARD_USERNAME", ""))
          print(values.get("ADMIN_DASHBOARD_PASSWORD", ""))
          PY
          )

          ADMIN_USER="${ADMIN_AUTH[0]:-}"
          ADMIN_PASSWORD="${ADMIN_AUTH[1]:-}"

          if [ -z "$ADMIN_USER" ] || [ -z "$ADMIN_PASSWORD" ]; then
            echo "Admin dashboard credentials are missing in $ENV_FILE" >&2
            exit 1
          fi

          echo "==> Fetching admin health"
          for attempt in $(seq 1 20); do
            if curl --fail --silent --show-error \
              --user "${ADMIN_USER}:${ADMIN_PASSWORD}" \
              "http://127.0.0.1:8080/api/health" \
              > "$HEALTH_JSON"; then
              break
            fi

            if [ "$attempt" -eq 20 ]; then
              echo "Admin health endpoint did not become ready in time" >&2
              exit 1
            fi

            echo "Admin health is not ready yet (attempt ${attempt}/20), waiting..."
            sleep 2
          done

          echo "==> Validating health payload"
          /usr/bin/env python3 - "$HEALTH_JSON" "$EXPECTED_COMMIT" <<'PY'
          import json
          import sys
          from pathlib import Path

          payload = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
          expected_commit = sys.argv[2]

          db_ok = bool(payload.get("db", {}).get("ok"))
          redis_ok = bool(payload.get("redis", {}).get("ok"))
          deployed_commit = str(payload.get("release", {}).get("commit") or "")

          if not db_ok:
              raise SystemExit("db.ok is false")
          if not redis_ok:
              raise SystemExit("redis.ok is false")
          if deployed_commit != expected_commit:
              raise SystemExit(
                  f"release.commit mismatch: expected {expected_commit}, got {deployed_commit}"
              )

          summary = {
              "db": payload.get("db"),
              "redis": payload.get("redis"),
              "release": payload.get("release"),
          }
          print(json.dumps(summary, ensure_ascii=False, indent=2))
          PY
          REMOTE
