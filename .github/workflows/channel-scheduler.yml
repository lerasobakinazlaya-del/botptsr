name: Channel scheduler

on:
  schedule:
    - cron: "35 9 * * *"
    - cron: "45 17 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Check due posts without publishing"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      limit:
        description: "Max posts per run"
        required: true
        default: "1"

concurrency:
  group: channel-scheduler
  cancel-in-progress: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      LIMIT: ${{ github.event.inputs.limit || '1' }}
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run || 'false' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install python-dotenv

      - name: Publish due posts
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            python scripts/publish_scheduled_channel_posts.py --limit "$LIMIT" --dry-run
          else
            python scripts/publish_scheduled_channel_posts.py --limit "$LIMIT"
          fi

      - name: Generate calendar preview
        run: python scripts/generate_channel_calendar_preview.py

      - name: Commit scheduler state
        if: env.DRY_RUN != 'true'
        run: |
          if [ -z "$(git status --short data/channel_published.json docs/channel-calendar-preview.md)" ]; then
            echo "No scheduler state changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/channel_published.json docs/channel-calendar-preview.md
          git commit -m "Update channel scheduler state"
          git push
