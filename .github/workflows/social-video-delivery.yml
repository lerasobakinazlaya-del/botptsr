name: Social video delivery

on:
  schedule:
    - cron: "15 6 * * *"
    - cron: "45 9 * * *"
    - cron: "15 13 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Check selected videos without sending"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      limit:
        description: "Max unique videos to send"
        required: true
        default: "3"
      all:
        description: "Send next undelivered videos regardless of publish time"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: social-video-delivery
  cancel-in-progress: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deliver:
    runs-on: ubuntu-latest
    env:
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      SOCIAL_DELIVERY_CHAT_ID: ${{ secrets.SOCIAL_DELIVERY_CHAT_ID }}
      STORY_DELIVERY_CHAT_ID: ${{ secrets.STORY_DELIVERY_CHAT_ID }}
      OWNER_ID: ${{ secrets.OWNER_ID }}
      LIMIT: ${{ github.event.inputs.limit || '3' }}
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run || 'false' }}
      SEND_ALL: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.all || 'false' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install python-dotenv

      - name: Deliver social videos to operator
        run: |
          ARGS=(--limit "$LIMIT")
          if [ "$DRY_RUN" = "true" ]; then
            ARGS+=(--dry-run)
          fi
          if [ "$SEND_ALL" = "true" ]; then
            ARGS+=(--all)
          fi
          python scripts/deliver_social_videos.py "${ARGS[@]}"

      - name: Commit delivery state
        if: env.DRY_RUN != 'true'
        run: |
          if [ -z "$(git status --short data/social_video_delivered.json)" ]; then
            echo "No delivery state changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/social_video_delivered.json
          git commit -m "Update social video delivery state"
          git push
