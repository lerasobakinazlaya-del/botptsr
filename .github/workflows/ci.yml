name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run prelaunch checks
        env:
          PYTHONUTF8: "1"
        run: python scripts/prelaunch_check.py --report-file logs/prelaunch_report.json

      - name: Upload prelaunch report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prelaunch-report
          path: logs/prelaunch_report.json
