name: Story scheduler

on:
  schedule:
    - cron: "37 7 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Check due stories without sending to admin"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      limit:
        description: "Max stories per run"
        required: true
        default: "1"

concurrency:
  group: story-scheduler
  cancel-in-progress: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      STORY_DELIVERY_CHAT_ID: ${{ secrets.STORY_DELIVERY_CHAT_ID }}
      LIMIT: ${{ github.event.inputs.limit || '1' }}
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run || 'false' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          python -m pip install python-dotenv pillow

      - name: Generate story assets
        run: python scripts/generate_story_assets.py

      - name: Generate message card pack
        run: python scripts/generate_message_card_pack.py

      - name: Deliver due stories to admin
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            python scripts/deliver_scheduled_stories.py --limit "$LIMIT" --dry-run
          else
            python scripts/deliver_scheduled_stories.py --limit "$LIMIT"
          fi

      - name: Commit story state
        if: env.DRY_RUN != 'true'
        run: |
          if [ -z "$(git status --short data/story_delivered.json docs/story-calendar-preview.md docs/message-card-pack-preview.md assets/stories/daily assets/message-cards/week-01)" ]; then
            echo "No story state changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/story_delivered.json docs/story-calendar-preview.md docs/message-card-pack-preview.md assets/stories/daily assets/message-cards/week-01
          git commit -m "Update story scheduler state"
          git push
